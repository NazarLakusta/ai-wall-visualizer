services:
  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped

  bot:
    restart: unless-stopped

  worker:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  cleanup:
    restart: unless-stopped

  ops:
    restart: unless-stopped

  nginx:
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
